<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arq Luz · Pedidos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="app-header">
  <div class="app-brand">
    <div class="login-bulb"></div>
    <h1>Arq Luz · Pedidos</h1>
  </div>
  <div class="header-right">
    <button class="bell-btn" id="bellBtn" title="Notificações">
      🔔
      <span class="bell-dot" id="bellDot">0</span>
    </button>
    <div class="user-pill">
      <span class="nome" id="userNome">—</span>
      <span class="papel" id="userPapel">—</span>
    </div>
    <button class="logout-btn" id="logoutBtn">Sair</button>
  </div>
</header>

<nav class="tabs">
  <button class="tab-btn active" data-tab="tarefas">Tarefas <span class="tab-count" id="countTarefas">0</span></button>
  <button class="tab-btn" data-tab="historico">Histórico <span class="tab-count" id="countHistorico">0</span></button>
  <button class="tab-btn" data-tab="notificacoes">Notificações <span class="tab-count" id="countNotif">0</span></button>
</nav>

<!-- ===== TAREFAS (Entrega + Obra + Retirada, juntas) ===== -->
<section class="tab-panel active" id="panel-tarefas">
  <div class="panel-body">
    <div class="panel-toolbar">
      <h2>Entregas, visitas em obra e retiradas</h2>
      <button class="btn-new" id="btnNovaTarefa">+ Nova tarefa</button>
    </div>
    <div class="filter-row" id="filtrosTipo">
      <button class="filter-chip active" data-tipo="todos">Todos</button>
      <button class="filter-chip" data-tipo="Entrega">📦 Entrega</button>
      <button class="filter-chip" data-tipo="Obra">🚗 Visita em obra</button>
      <button class="filter-chip" data-tipo="Retirada">🏬 Retirada na loja</button>
    </div>
    <div class="card-list" id="listaTarefas"></div>
  </div>
</section>

<!-- ===== HISTÓRICO ===== -->
<section class="tab-panel" id="panel-historico">
  <div class="panel-body">
    <div class="panel-toolbar">
      <h2>Histórico — concluídas</h2>
    </div>
    <div class="filter-row" id="filtrosHistorico">
      <button class="filter-chip active" data-tipo="todos">Todos</button>
      <button class="filter-chip" data-tipo="Entrega">📦 Entrega</button>
      <button class="filter-chip" data-tipo="Obra">🚗 Visita em obra</button>
      <button class="filter-chip" data-tipo="Retirada">🏬 Retirada</button>
    </div>
    <div class="card-list" id="listaHistorico"></div>
  </div>
</section>

<!-- ===== NOTIFICAÇÕES ===== -->
<section class="tab-panel" id="panel-notificacoes">
  <div class="panel-body">
    <div class="panel-toolbar">
      <h2>Notificações recentes</h2>
    </div>
    <div id="listaNotificacoes"></div>
  </div>
</section>

<!-- ===== MODAL: NOVA TAREFA ===== -->
<div class="modal-backdrop" id="modalTarefa">
  <div class="modal-box">
    <h3>Nova tarefa</h3>

    <div class="field">
      <label>Tipo *</label>
      <div class="porte-options" id="tipo_options">
        <label class="porte-opt" data-tipo="Entrega"><input type="radio" name="tipo_tarefa" value="Entrega">📦<br>Entrega</label>
        <label class="porte-opt" data-tipo="Obra"><input type="radio" name="tipo_tarefa" value="Obra">🚗<br>Visita em obra</label>
        <label class="porte-opt" data-tipo="Retirada"><input type="radio" name="tipo_tarefa" value="Retirada">🏬<br>Retirada na loja</label>
      </div>
    </div>

    <form id="formTarefa">
      <!-- Campos comuns a Entrega e Retirada -->
      <div id="grupo_cliente" class="campo-grupo" hidden>
        <div class="field">
          <label>Cliente *</label>
          <input type="text" id="tf_cliente">
        </div>
        <div class="field-row">
          <div class="field">
            <label>Telefone</label>
            <input type="text" id="tf_telefone" placeholder="17 99999-9999">
          </div>
          <div class="field">
            <label>Porte da mercadoria *</label>
          </div>
        </div>
        <div class="porte-options" id="porte_options">
          <label class="porte-opt sel-pequena" data-porte="Pequena"><input type="radio" name="tf_porte" value="Pequena"><div class="dot"></div>Pequena</label>
          <label class="porte-opt sel-media" data-porte="Média"><input type="radio" name="tf_porte" value="Média"><div class="dot"></div>Média</label>
          <label class="porte-opt sel-grande" data-porte="Grande"><input type="radio" name="tf_porte" value="Grande"><div class="dot"></div>Grande</label>
        </div>
      </div>

      <!-- Campos só de Entrega -->
      <div id="grupo_entrega" class="campo-grupo" hidden>
        <div class="field">
          <label>Endereço</label>
          <input type="text" id="tf_endereco">
        </div>
        <div class="field-row">
          <div class="field">
            <label>Bairro</label>
            <input type="text" id="tf_bairro">
          </div>
          <div class="field">
            <label>Cidade</label>
            <input type="text" id="tf_cidade" value="Votuporanga">
          </div>
        </div>
      </div>

      <!-- Campos só de Obra -->
      <div id="grupo_obra" class="campo-grupo" hidden>
        <div class="field">
          <label>Motivo *</label>
          <input type="text" id="tf_motivo" placeholder="Ex: entrega de mercadoria, visita técnica...">
        </div>
        <div class="field-row">
          <div class="field">
            <label>Destino *</label>
            <input type="text" id="tf_destino">
          </div>
          <div class="field">
            <label>Cliente / obra</label>
            <input type="text" id="tf_clienteObra">
          </div>
        </div>
        <div class="field-row">
          <div class="field">
            <label>Saída prevista</label>
            <input type="time" id="tf_saida">
          </div>
          <div class="field">
            <label>Volta prevista</label>
            <input type="time" id="tf_volta">
          </div>
        </div>
      </div>

      <div class="field">
        <label>Data prevista *</label>
        <input type="date" id="tf_data" required>
      </div>

      <div class="field">
        <label>Observação</label>
        <textarea id="tf_obs" placeholder="Ex: ligar antes de ir, cliente vem retirar, eletricista vai buscar..."></textarea>
      </div>

      <div class="modal-actions">
        <button type="button" class="btn-secondary" data-close="modalTarefa">Cancelar</button>
        <button type="submit" class="btn-primary" style="width:auto;">Cadastrar tarefa</button>
      </div>
    </form>
  </div>
</div>

<script type="module" src="js/app.js"></script>
</body>
</html>
