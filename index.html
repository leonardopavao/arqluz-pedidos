<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arq Luz · Pedidos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="login-shell">
  <div class="login-card">
    <div class="login-mark">
      <div class="login-bulb"></div>
      <h1>Arq Luz<span>Pedidos · Entregas e visitas</span></h1>
    </div>

    <div class="login-error" id="loginError"></div>

    <form id="loginForm">
      <div class="field">
        <label for="usuario">Quem é você?</label>
        <select id="usuario" required>
          <option value="" disabled selected>Selecione seu nome</option>
        </select>
      </div>
      <div class="field">
        <label for="senha">Senha</label>
        <input type="password" id="senha" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn-primary" id="loginBtn">Entrar</button>
    </form>
  </div>
</div>

<script type="module" src="js/login.js"></script>
</body>
</html>
